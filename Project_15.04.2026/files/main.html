<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoffeeLab — Каталог</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <div class="brand">☕ CoffeeLab</div>
      <div class="nav-links">
        <a href="main.html" class="active">Каталог</a>
        <a href="cart.html">Себет (<span data-cartcount>0</span>)</a>
        <a href="tools.html">Лаборатория</a>
        <a href="profile.html">Профиль</a>
      </div>
      <div class="userbox">
        <img id="navAvatar" src="" alt=""
          style="display:none; width:28px; height:28px; border-radius:50%; object-fit:cover; border:2px solid var(--accent);">
        <span style="font-size:18px;" id="navAvatarDefault">👤</span>
        <strong id="userName">Guest</strong>
        <button id="logoutBtn" class="btn-danger btn-sm">Шығу</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="catalog-header">

      <!-- Hero / Categories -->
      <div>
        <div class="card" style="margin-bottom:20px;">
          <h2>Дәмді бірдеңе таңдаңыз ☕</h2>
          <p class="muted">Мәзірімізден таңдаңыз. «Себетке» түймесін басыңыз, сонда тауар тапсырысыңызға бірден қосылады.</p>
          <div style="margin-top:16px;">
            <button class="btn-ghost btn-sm" id="toggleBrew">Бариста құралы: Температура</button>
          </div>
        </div>

        <!-- Hidden Brew Widget -->
        <div class="card hidden" id="brewWidget" style="margin-bottom:20px; border-color:var(--accent);">
          <h3>🌡️ Температура конвертері</h3>
          <p class="small muted">V60 пуровері немесе аэропресс үшін таптырмас құрал.</p>
          <form id="tempFormCat" style="display:flex; gap:10px; align-items:flex-end;">
            <div style="flex:1;">
              <label class="small">Градустар</label>
              <input id="tempValueCat" type="number" step="0.1" placeholder="Мысалы: 93" required
                style="padding:8px 10px;">
            </div>
            <div style="flex:1;">
              <label class="small">Неден аудару керек?</label>
              <select id="tempUnitCat" style="padding:8px 10px;">
                <option value="C">°C-тан °F-қа</option>
                <option value="F">°F-тан °C-қа</option>
              </select>
            </div>
            <button class="btn btn-sm" type="submit" style="padding:10px 14px;">Ок</button>
          </form>
          <div id="tempOutCat" class="notice hidden" style="margin-top:10px; padding:8px;"></div>
        </div>

        <!-- Filters -->
        <div class="cat-filters">
          <button class="cat-btn active" data-cat="Все">Барлығы 🌟</button>
          <button class="cat-btn" data-cat="Кофе">Кофе ☕</button>
          <button class="cat-btn" data-cat="Чай">Шай 🍃</button>
          <button class="cat-btn" data-cat="Напитки">Лимонадтар 🍹</button>
          <button class="cat-btn" data-cat="Легкая еда">Тағамдар 🥪</button>
          <button class="cat-btn" data-cat="Вкусняшки">Десерттер 🍰</button>
        </div>
      </div>

      <!-- Mini Cart Summary -->
      <div class="card" style="position:sticky; top:90px;">
        <h3>Сіздің тапсырысыңыз</h3>
        <div id="miniCartList" style="margin-bottom:16px;"></div>
        <a href="cart.html" class="btn" style="display:block; text-align:center;">Себетке өту</a>
      </div>

    </div>

    <!-- Product Grid -->
    <div id="catalogGrid" class="products">
      <!-- Generated by app.js -->
    </div>

  </div>
</body>

</html>
